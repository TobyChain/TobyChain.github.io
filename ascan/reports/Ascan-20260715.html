<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <title>Ascan-20260715</title>
  <style>/* ── Notion-inspired Design System for Ascan Daily Report ── */
:root {
  color-scheme: light;
  /* Surface & Canvas */
  --canvas: #ffffff;
  --surface: #f7f7f5;
  --surface-soft: #f1f1ef;
  /* Borders */
  --hairline: #e8e7e4;
  --hairline-soft: #eeeeed;
  --hairline-strong: #d3d1cb;
  /* Text */
  --ink-deep: #0f0f0f;
  --ink: #191919;
  --charcoal: #37352f;
  --slate: #6b6b6b;
  --steel: #9b9a97;
  --stone: #b4b3af;
  --muted: #c4c3bf;
  /* Brand Accents */
  --primary: #6c47ff;
  --primary-pressed: #5a3ad6;
  --link-blue: #2383e2;
  /* Semantic Tints */
  --tint-lavender: #e8deee;
  --tint-peach: #faebdd;
  --tint-mint: #dbeddb;
  --tint-sky: #d3e5ef;
  --tint-yellow: #fdecc8;
  --brand-purple-800: #4a2d8a;
  --brand-orange-deep: #b05c1a;
  --brand-green: #2d7d46;
  /* Elevation */
  --shadow-subtle: rgba(15, 15, 15, 0.04) 0px 1px 2px 0px;
  --shadow-card: rgba(15, 15, 15, 0.06) 0px 3px 8px 0px;
  /* Spacing base unit: 4px */
  --sp-xs: 4px;
  --sp-sm: 8px;
  --sp-md: 12px;
  --sp-lg: 16px;
  --sp-xl: 24px;
  --sp-xxl: 32px;
  --sp-section: 48px;
  /* Radius */
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-full: 9999px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--canvas);
  color: var(--charcoal);
  font-family: Inter, -apple-system, system-ui, "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--link-blue); text-decoration: none; transition: color 0.15s ease; }
a:hover { text-decoration: underline; color: #1a6dc2; }

/* ── Page Container ── */
.page {
  max-width: 900px;
  margin: 0 auto;
  padding: var(--sp-xxl) var(--sp-xl) var(--sp-section);
}

/* ── Hero / Header ── */
.hero {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--r-lg);
  padding: var(--sp-xxl) var(--sp-xl);
  margin-bottom: var(--sp-section);
}
.hero h1 {
  font-size: 36px;
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: -0.5px;
  color: var(--ink-deep);
  margin-bottom: var(--sp-sm);
}
.hero p {
  font-size: 16px;
  color: var(--slate);
  line-height: 1.55;
}

/* ── Section Headings ── */
.report-section { margin-top: var(--sp-section); }
.report-section > h2 {
  font-size: 28px;
  font-weight: 600;
  line-height: 1.25;
  letter-spacing: 0;
  color: var(--ink-deep);
  margin-bottom: var(--sp-lg);
  padding-bottom: var(--sp-sm);
  border-bottom: 1px solid var(--hairline);
}

/* ── Cards ── */
.card {
  background: var(--canvas);
  border: 1px solid var(--hairline);
  border-radius: var(--r-lg);
  padding: var(--sp-xl);
  margin-bottom: var(--sp-lg);
  transition: box-shadow 0.15s ease;
}
.card:hover { box-shadow: var(--shadow-card); }
.card h3 {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--ink-deep);
  margin-bottom: var(--sp-sm);
}
.card h4 {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--ink);
  margin-bottom: var(--sp-xs);
}

/* ── Meta & Muted Text ── */
.meta {
  font-size: 14px;
  color: var(--slate);
  line-height: 1.5;
  margin-bottom: var(--sp-sm);
}
.muted, .section-note, .empty-state {
  font-size: 14px;
  color: var(--steel);
  line-height: 1.5;
}
.empty-state {
  padding: var(--sp-xl);
  text-align: center;
  background: var(--surface);
  border-radius: var(--r-md);
}

/* ── Lead (one-liner emphasis) ── */
.lead {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.55;
  margin-bottom: var(--sp-sm);
}

/* ── Tags ── */
.tags { display: flex; flex-wrap: wrap; gap: var(--sp-sm); margin: var(--sp-sm) 0; }
.tag {
  display: inline-flex;
  align-items: center;
  border-radius: var(--r-sm);
  background: var(--tint-lavender);
  color: var(--brand-purple-800);
  padding: 2px 8px;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
}

/* ── Recommendation Callout ── */
.recommendation {
  border-left: 3px solid var(--primary);
  background: var(--surface);
  padding: var(--sp-md) var(--sp-lg);
  border-radius: var(--r-md);
  margin-top: var(--sp-md);
  font-size: 14px;
  line-height: 1.55;
  color: var(--charcoal);
}

/* ── Summary Block ── */
.summary-block {
  margin-top: var(--sp-md);
  padding-top: var(--sp-md);
  border-top: 1px solid var(--hairline-soft);
}
.summary-block h4 {
  font-size: 14px;
  font-weight: 600;
  color: var(--slate);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: var(--sp-xs);
}
.summary-block p {
  font-size: 15px;
  line-height: 1.6;
  color: var(--charcoal);
}

/* ── Links Row ── */
.links {
  font-size: 14px;
  font-weight: 500;
  margin: var(--sp-sm) 0;
}
.links a { margin-right: var(--sp-xs); }

/* ── Tables ── */
.table-wrapper { overflow-x: auto; margin: var(--sp-lg) 0; }
table {
  width: 100%;
  border-collapse: collapse;
  background: var(--canvas);
  border: 1px solid var(--hairline);
  border-radius: var(--r-md);
  overflow: hidden;
  font-size: 14px;
}
th {
  background: var(--surface);
  font-weight: 600;
  color: var(--ink);
  padding: var(--sp-md) var(--sp-lg);
  text-align: left;
  border-bottom: 1px solid var(--hairline);
}
td {
  padding: var(--sp-md) var(--sp-lg);
  border-bottom: 1px solid var(--hairline-soft);
  color: var(--charcoal);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }

/* ── Meta List (repo details) ── */
.meta-list {
  padding-left: var(--sp-xl);
  margin: var(--sp-sm) 0;
  font-size: 14px;
  color: var(--slate);
  line-height: 1.6;
}
.meta-list li { margin-bottom: var(--sp-xs); }
.meta-list strong { color: var(--charcoal); font-weight: 500; }

/* ── Footer ── */
.footer {
  margin-top: var(--sp-section);
  padding-top: var(--sp-lg);
  border-top: 1px solid var(--hairline);
  color: var(--steel);
  text-align: center;
  font-size: 13px;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .page { padding: var(--sp-lg) var(--sp-md) var(--sp-xxl); }
  .hero { padding: var(--sp-xl) var(--sp-lg); }
  .hero h1 { font-size: 28px; }
  .report-section > h2 { font-size: 22px; }
  .card { padding: var(--sp-lg); }
  .card h3 { font-size: 18px; }
  th, td { padding: var(--sp-sm) var(--sp-md); }
}</style>
